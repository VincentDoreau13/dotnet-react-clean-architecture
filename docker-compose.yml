version: "3.9"

services:
  shopapi:
    image: shopapi:latest
    build:
      context: src/back
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - UseInMemoryDatabase=false
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=shop_api;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shop-network

  shopfront:
    image: shopfront:latest
    build:
      context: src/front
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - shopapi
    restart: unless-stopped
    networks:
      - shop-network

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shop_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge

volumes:
  pgdata:
