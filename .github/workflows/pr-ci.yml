name: PR Quality Gate

# Runs on every PR to master/develop regardless of which files changed.
# Use this workflow as the required status check for branch protection rules.

on:
  pull_request:
    branches: [master, develop]

jobs:
  back:
    name: Back-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore ShopApi.csproj

      - name: Build
        run: dotnet build ShopApi.csproj --no-restore --configuration Release

  front:
    name: Front-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [back, front]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.back.result }}" != "success" ] || [ "${{ needs.front.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
