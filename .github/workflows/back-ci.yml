name: Back-end CI

on:
  push:
    branches: [master, develop]
    paths:
      - "src/back/**"
      - ".github/workflows/back-ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "src/back/**"
      - ".github/workflows/back-ci.yml"

defaults:
  run:
    working-directory: src/back

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore ShopApi.csproj

      - name: Build
        run: dotnet build ShopApi.csproj --no-restore --configuration Release

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: src/back
          file: src/back/Dockerfile
          push: false
          tags: shopapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
